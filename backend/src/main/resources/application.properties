server.port=8080
spring.application.name=lgp-taxwealth

# CORS: override with env var CORS_ALLOWED_ORIGINS on Cloud Run
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Gmail SMTP — set MAIL_PASSWORD env var to a Gmail App Password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:YangfanCheng1@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Notification recipient
mail.notification.to=YangfanCheng1@gmail.com

# Logging
logging.level.com.lgp=DEBUG
logging.level.org.springframework.web=INFO
